  .gh-heatmap-footer { display: flex; justify-content: flex-end; margin-top: 10px; }

    background: rgba(30,30,30,0.95); backdrop-filter: blur(12px);
    border-radius: 8px; padding: 8px 12px;
    font-size: 0.75rem; font-weight: 500; color: #fff;
    white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    position: relative;
  }
  [data-color-mode="dark"] .gh-tooltip__body {
    background: rgba(17,24,39,0.95);
  }

  .gh-tooltip__arrow {
    position: absolute; left: 50%;
    width: 0; height: 0; border-style: solid;
    transform: translateX(-50%);
  }

  .gh-tooltip.above .gh-tooltip__arrow {
    top: 100%;
    border-width: 6px 6px 0 6px;
    border-color: rgba(30,30,30,0.95) transparent transparent transparent;
    margin-top: -1px;
  }
  [data-color-mode="dark"] .gh-tooltip.above .gh-tooltip__arrow {
    border-color: rgba(17,24,39,0.95) transparent transparent transparent;
  }

  .gh-tooltip.below .gh-tooltip__arrow {
    bottom: 100%;
    border-width: 0 6px 6px 6px;
    border-color: transparent transparent rgba(30,30,30,0.95) transparent;
    margin-bottom: -1px;
  }
  [data-color-mode="dark"] .gh-tooltip.below .gh-tooltip__arrow {
    border-color: transparent transparent rgba(17,24,39,0.95) transparent;
  }

  .gh-tooltip.above.show { animation: ghFadeIn 150ms ease-out; }
  .gh-tooltip.below.show { animation: ghFadeInBelow 150ms ease-out; }

  @keyframes ghFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ghFadeInBelow {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }

  .heatmap-cell {

  }
</style>

<script>
(function () {
  'use strict';

  const NS = 'http://www.w3.org/2000/svg';
  const CELL = 11, GAP = 3;
  const LEVEL_OPACITY = [0.05, 0.25, 0.5, 0.75, 1.0];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_7  = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
  const DAYS_14 = ['', 'Mon', '', 'Wed', '', 'Fri', '', 'Sun', '', 'Tue', '', 'Thu', '', 'Sat'];
  const LABEL_OFFSET = 28, HEADER_OFFSET = 16;
  const MOBILE_BREAKPOINT = 640;

  const svg = document.getElementById('gh-svg');
  const statsCount = document.getElementById('gh-stats-count');
  const tooltip = document.getElementById('gh-tooltip');
  const tooltipBody = tooltip.querySelector('.gh-tooltip__body');
  const tooltipArrow = tooltip.querySelector('.gh-tooltip__arrow');

  
  function isDark() {
    return document.documentElement.getAttribute('data-color-mode') === 'dark';
  }
  function labelColor() {
    return isDark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)';
  }
  function cellColor(level) {
    return `rgba(35,154,59,${LEVEL_OPACITY[Math.min(level, 4)]})`;
  }

  
  function getRows() {
    return window.innerWidth <= MOBILE_BREAKPOINT ? 14 : 7;
  }
  function getDays() {
    return getRows() === 14 ? DAYS_14 : DAYS_7;
  }
  function weeks() {
    return Math.ceil(contributions.length / getRows());
  }
  function svgSize() {
    const rows = getRows();
    return {
      w: LABEL_OFFSET + weeks() * (CELL + GAP),
      h: HEADER_OFFSET + rows * (CELL + GAP),
    };
  }

  
  let contributions = [];

  async function fetchData() {
    const res = await fetch(`https://github-contributions-api.jogruber.de/v4/full-finger?y=last`);
    return res.json();
  }

  
  function buildMonthLabels() {
    const rows = getRows();
    const labels = [];
    let last = -1;
    for (let w = 0; w < weeks(); w++) {
      const idx = w * rows;
      if (idx >= contributions.length) break;
      const m = new Date(contributions[idx].date).getMonth();
      if (m !== last) {
        labels.push({ text: MONTHS[m], x: LABEL_OFFSET + w * (CELL + GAP) });
        last = m;
      }
    }
    
    if (labels.length >= 2 && labels[1].x - labels[0].x < CELL + GAP + 20) {
      labels.shift();
    }
    return labels;
}

  

  function render() {
    const rows = getRows();
    const days = getDays();
    const { w, h } = svgSize();
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.innerHTML = '';

    const fill = labelColor();

    
    buildMonthLabels().forEach(({ text, x }) => {
      const el = document.createElementNS(NS, 'text');
      el.setAttribute('x',  x);
      el.setAttribute('y', 11);
      el.setAttribute('font-size', 10);
      el.setAttribute('fill', fill);
      el.textContent = text;
      svg.appendChild(el);
    });

    
    days.forEach((d, i) => {
      if (!d) return;
      const el = document.createElementNS(NS, 'text');
      el.setAttribute('x', 0);
      el.setAttribute('y', HEADER_OFFSET + i * (CELL + GAP) + CELL - 1);
      el.setAttribute('font-size', 9);
      el.setAttribute('fill', fill);
      el.textContent = d;
      svg.appendChild(el);
    });

    
    contributions.forEach((day, idx) => {
      const col = Math.floor(idx / rows);
      const row = idx % rows;
      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('x', LABEL_OFFSET + col * (CELL + GAP));
      rect.setAttribute('y', HEADER_OFFSET + row * (CELL + GAP));
      rect.setAttribute('width', CELL);
      rect.setAttribute('height', CELL);
      rect.setAttribute('rx', 2);
      rect.setAttribute('ry', 2);
      rect.setAttribute('class', 'heatmap-cell');
      rect.setAttribute('fill', cellColor(day.level));
      rect.dataset.date = day.date;
      rect.dataset.count = day.count;
      svg.appendChild(rect);
    });
  }

  
  function formatDate(str) {
    const d = new Date(str);
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  function showTooltip(e) {
    const rect = e.target;
    if (!rect.dataset.date) return;

    const count = parseInt(rect.dataset.count, 10);
    tooltipBody.textContent = count > 0
      ? `${formatDate(rect.dataset.date)}: ${count} 次贡献`
      : `${formatDate(rect.dataset.date)}: 无贡献`;

    tooltip.classList.add('show');

    const cellRect = rect.getBoundingClientRect();
    const tipRect = tooltip.getBoundingClientRect();
    const gap = 8, margin = 8;

    let x = cellRect.left + cellRect.width / 2 - tipRect.width / 2;
    let y = cellRect.top - tipRect.height - gap;
    let above = true;

    x = Math.max(margin, Math.min(x, window.innerWidth - tipRect.width - margin));

    if (y < margin) {
      y = cellRect.bottom + gap;
      above = false;
    }

    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
    tooltip.classList.toggle('above', above);
    tooltip.classList.toggle('below', !above);

    const arrowX = cellRect.left + cellRect.width / 2 - x;
    tooltipArrow.style.left = arrowX + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('show');
  }

  
  svg.addEventListener('mouseover', (e) => {
    if (e.target.classList.contains('heatmap-cell')) showTooltip(e);
  });
  svg.addEventListener('mouseout', (e) => {
    if (e.target.classList.contains('heatmap-cell')) hideTooltip();
  });

  
  new MutationObserver(render).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-color-mode'],
  });

  
  let lastRows = getRows();
  window.addEventListener('resize', () => {
    const current = getRows();
    if (current !== lastRows) {
      lastRows = current;
      render();
    }
  });

  
  fetchData()
    .then((data) => {
      statsCount.textContent = data.total.lastYear;
      contributions = data.contributions;
      render();
    })
    .catch(() => { statsCount.textContent = '--'; });

})();
</script>
